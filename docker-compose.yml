version: '3'
services:
  pantry-fairy-db:
    image: mysql:8.0
    container_name: home-order-db
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: home-order-password
      MYSQL_DATABASE: home_order_dev
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./db/mysql/data:/var/lib/mysql
    restart: always